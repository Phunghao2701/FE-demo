<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quên mật khẩu — ResearchPulse</title>
  <link rel="stylesheet" href="../assets/css/design-system.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/layouts.css"/>
  <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,255,.1) 0%,transparent 70%),var(--color-bg-primary);}</style>
</head>
<body>
<div style="max-width:440px;width:100%;text-align:center">
  <a href="../index.html" class="nav-logo" style="display:inline-flex;margin-bottom:40px">
    <div class="nav-logo-icon">🔬</div><span class="nav-logo-text">ResearchPulse</span>
  </a>
  <div class="card" style="padding:48px 40px;text-align:left" id="form-step">
    <div style="font-size:48px;text-align:center;margin-bottom:20px">🔑</div>
    <h1 style="font-size:26px;font-weight:800;margin-bottom:8px;text-align:center">Quên mật khẩu?</h1>
    <p style="color:var(--color-text-secondary);font-size:14px;text-align:center;margin-bottom:32px;line-height:1.7">Nhập email đã đăng ký. Chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
    <form onsubmit="return false">
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label required">Email</label>
        <div class="input-wrapper">
          <span class="input-icon-left">📧</span>
          <input type="email" class="form-input has-icon-left" id="forgot-email" placeholder="name@email.com"/>
        </div>
      </div>
      <button type="button" class="btn btn-primary" style="width:100%;padding:13px" onclick="sendReset()">Gửi link đặt lại</button>
    </form>
  </div>
  <div class="card" style="padding:48px 40px;text-align:center;display:none" id="success-step">
    <div style="font-size:60px;margin-bottom:20px">📨</div>
    <h2 style="font-size:22px;font-weight:800;margin-bottom:10px">Đã gửi!</h2>
    <p style="color:var(--color-text-secondary);font-size:14px;line-height:1.8;margin-bottom:32px">Link đặt lại mật khẩu đã được gửi đến email của bạn. Vui lòng kiểm tra hộp thư (bao gồm Spam).</p>
    <a href="reset-password.html" class="btn btn-primary" style="width:100%;padding:13px;display:flex">Đặt lại mật khẩu →</a>
  </div>
  <p style="margin-top:20px;font-size:13px;color:var(--color-text-muted)"><a href="login.html" style="color:var(--color-text-secondary)">← Quay lại đăng nhập</a></p>
</div>
<script src="../assets/js/main.js"></script>
<script>
function sendReset(){
  const email = document.querySelector('#forgot-email').value;
  if(!email){ return; }
  document.querySelector('#form-step').style.display='none';
  document.querySelector('#success-step').style.display='block';
}
</script>
</body>
</html>
