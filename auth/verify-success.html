<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Kích hoạt tài khoản thành công — ResearchPulse</title>
  <link rel="stylesheet" href="../assets/css/design-system.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/layouts.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0, 212, 255, 0.1) 0%, transparent 70%), var(--color-bg-primary);
    }
    
    .success-container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    
    .success-icon-circle {
      width: 80px;
      height: 80px;
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid var(--color-success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--color-success);
      box-shadow: 0 0 24px rgba(16, 185, 129, 0.15);
      animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    
    .success-icon {
      width: 40px;
      height: 40px;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: strokeCheck 0.5s 0.3s ease-out forwards;
    }
    
    .detail-box {
      background: var(--color-bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      padding: 16px;
      margin: 24px 0;
      text-align: left;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    
    .detail-row:not(:last-child) {
      border-bottom: 1px solid var(--border-color);
    }
    
    .redirect-timer {
      font-size: 13px;
      color: var(--color-text-muted);
      margin: 20px 0 8px;
    }
    
    .progress-bar-wrap {
      width: 100%;
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    
    .progress-bar {
      height: 100%;
      width: 100%;
      background: var(--color-accent);
      transform-origin: left;
      animation: shrinkProgress 5s linear forwards;
    }
    
    @keyframes scaleUp {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    @keyframes strokeCheck {
      to { stroke-dashoffset: 0; }
    }
    
    @keyframes shrinkProgress {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }
  </style>
</head>
<body>
<div class="success-container animate-fadeInUp">
  <a href="../index.html" class="nav-logo" style="display:inline-flex;margin-bottom:32px">
    <div class="nav-logo-icon">🔬</div>
    <span class="nav-logo-text">ResearchPulse</span>
  </a>
  
  <div class="card" style="padding:48px 40px">
    <div class="success-icon-circle">
      <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    
    <h1 style="font-size:26px;font-weight:800;margin-bottom:12px">Kích hoạt tài khoản thành công</h1>
    <p style="color:var(--color-text-secondary);font-size:15px;line-height:1.6">Tài khoản của bạn đã được kích hoạt thành công trên hệ thống ResearchPulse. Bây giờ bạn có thể truy cập đầy đủ các tính năng.</p>
    

    
    <div class="redirect-timer">
      Tự động chuyển hướng sau <span id="countdown" style="font-weight:700;color:var(--color-accent)">5</span> giây...
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar"></div>
    </div>
    
    <div style="display:grid;grid-template-columns:1fr;gap:12px">
      <a href="../dashboard/index.html" class="btn btn-primary" style="width:100%;padding:13px;text-decoration:none;display:inline-block">Đi đến Dashboard</a>
      <a href="../index.html" class="btn btn-ghost" style="width:100%;padding:12px;text-decoration:none;display:inline-block;color:var(--color-text-secondary)">Về trang chủ</a>
    </div>
  </div>
  
  <p style="margin-top:20px;font-size:13px;color:var(--color-text-muted)">
    Hỗ trợ kỹ thuật? <a href="#" style="color:var(--color-accent)">Liên hệ chúng tôi</a>
  </p>
</div>

<script src="../assets/js/main.js"></script>
<script>
  // Get email from URL parameters if available
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (email) {
    document.getElementById('user-email').textContent = decodeURIComponent(email);
  } else {
    // Attempt to get logged in user's email or localStorage
    const savedName = localStorage.getItem('userName');
    if (savedName) {
      document.getElementById('user-email').textContent = savedName.toLowerCase().replace(/\s+/g, '') + '@example.com';
    }
  }

  // Set local login status to true for demo experience
  localStorage.setItem('isLoggedIn', 'true');
  localStorage.setItem('userName', localStorage.getItem('userName') || 'John Doe');
  localStorage.setItem('userRole', localStorage.getItem('userRole') || 'user');

  // Countdown timer redirect
  let countdown = 5;
  const countdownEl = document.getElementById('countdown');
  const timer = setInterval(() => {
    countdown--;
    if (countdownEl) countdownEl.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(timer);
      window.location.href = '../dashboard/index.html';
    }
  }, 1000);
</script>
</body>
</html>
