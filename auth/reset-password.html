<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Đặt lại mật khẩu — ResearchPulse</title>
  <link rel="stylesheet" href="../assets/css/design-system.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/layouts.css"/>
  <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,255,.1) 0%,transparent 70%),var(--color-bg-primary);}</style>
</head>
<body>
<div style="max-width:440px;width:100%">
  <a href="../index.html" class="nav-logo" style="display:inline-flex;margin-bottom:40px">
    <div class="nav-logo-icon">🔬</div><span class="nav-logo-text">ResearchPulse</span>
  </a>
  <div class="card" style="padding:48px 40px">
    <div style="font-size:48px;text-align:center;margin-bottom:20px">🔐</div>
    <h1 style="font-size:26px;font-weight:800;margin-bottom:8px;text-align:center">Đặt lại mật khẩu</h1>
    <p style="color:var(--color-text-secondary);font-size:14px;text-align:center;margin-bottom:32px">Tạo mật khẩu mới cho tài khoản của bạn</p>
    <form class="auth-form" onsubmit="return false">
      <div class="form-group">
        <label class="form-label required">Mật khẩu mới</label>
        <div class="input-wrapper">
          <span class="input-icon-left">🔒</span>
          <input type="password" class="form-input has-icon-left has-icon-right" id="new-pass" placeholder="Tối thiểu 8 ký tự"/>
          <button type="button" class="input-icon-right" data-password-toggle="#new-pass" style="background:none;border:none;cursor:pointer">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Xác nhận mật khẩu mới</label>
        <div class="input-wrapper">
          <span class="input-icon-left">🔒</span>
          <input type="password" class="form-input has-icon-left has-icon-right" id="confirm-pass" placeholder="Nhập lại mật khẩu"/>
          <button type="button" class="input-icon-right" data-password-toggle="#confirm-pass" style="background:none;border:none;cursor:pointer">👁️</button>
        </div>
      </div>
      <div class="alert alert-error" id="reset-error" style="display:none">
        <span class="alert-icon">⚠️</span><span id="reset-error-msg">Mật khẩu xác nhận không khớp.</span>
      </div>
      <div class="alert alert-success" id="reset-success" style="display:none">
        <span class="alert-icon">✅</span><span>Mật khẩu đã được đặt lại thành công!</span>
      </div>
      <button type="button" class="btn btn-primary" style="width:100%;padding:13px" onclick="doReset()">Đặt lại mật khẩu</button>
    </form>
  </div>
  <p style="margin-top:20px;text-align:center;font-size:13px;color:var(--color-text-muted)"><a href="login.html" style="color:var(--color-text-secondary)">← Quay lại đăng nhập</a></p>
</div>
<script src="../assets/js/main.js"></script>
<script>
function doReset(){
  const p1 = document.querySelector('#new-pass').value;
  const p2 = document.querySelector('#confirm-pass').value;
  const err = document.querySelector('#reset-error');
  const suc = document.querySelector('#reset-success');
  err.style.display='none'; suc.style.display='none';
  if(!p1 || p1.length < 8){ err.querySelector('span:last-child').textContent='Mật khẩu phải có ít nhất 8 ký tự.'; err.style.display='flex'; return; }
  if(p1 !== p2){ err.querySelector('span:last-child').textContent='Mật khẩu xác nhận không khớp.'; err.style.display='flex'; return; }
  suc.style.display='flex';
  setTimeout(()=>window.location.href='login.html', 2000);
}
</script>
</body>
</html>
