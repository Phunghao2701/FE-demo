<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  
  <style>
    .txt-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #f8fafc; }
    .txt-body { font-family: system-ui, -apple-system, sans-serif; font-weight: 400; fill: #94a3b8; }
    .txt-accent { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #00d4ff; }
    .btn-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12px; fill: #ffffff; text-anchor: middle; }
    .nav-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 14px; fill: #94a3b8; }
    .nav-text.active { fill: #f8fafc; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)" />

  <!-- APP NAVBAR (Horizontal top navbar) -->
  <rect width="1200" height="64" fill="#0b0f19" />
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#1e293b" stroke-width="1" />
  <text x="50" y="38" class="txt-title" font-size="20" letter-spacing="-0.5">🔬 <tspan fill="#00d4ff">Research</tspan>Pulse</text>
  
  <!-- Horizontal App Nav Items -->
  <text x="250" y="37" class="nav-text active">🏠 Dashboard</text>
  <line x1="245" y1="63" x2="340" y2="63" stroke="#00d4ff" stroke-width="2" />
  
  <text x="370" y="37" class="nav-text">🔍 Tìm kiếm</text>
  <text x="480" y="37" class="nav-text">🌏 Bản đồ địa lý</text>
  <text x="610" y="37" class="nav-text">🏆 Tác giả</text>
  <text x="700" y="37" class="nav-text">📁 Projects</text>
  
  <!-- Right Navbar Profile & Lang -->
  <rect x="940" y="16" width="60" height="32" rx="6" fill="#1e293b" />
  <text x="970" y="36" font-family="sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">🌐 VI</text>
  
  <!-- User Profile indicator -->
  <circle cx="1040" cy="32" r="16" fill="url(#accent-grad)" />
  <text x="1040" y="36" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">JD</text>
  <text x="1065" y="37" class="txt-title" font-size="13">John Doe ▾</text>

  <!-- CONTENT CONTAINER -->
  <!-- Welcome Banner -->
  <text x="50" y="110" class="txt-title" font-size="26">Chào mừng bạn đến với ResearchPulse! 👋</text>
  <text x="50" y="135" class="txt-body" font-size="14">Khám phá xu hướng, tạp chí và các bài báo khoa học mới nhất.</text>

  <!-- STATS GRID -->
  <!-- Stat Card 1 -->
  <rect x="50" y="165" width="250" height="90" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <text x="75" y="200" font-size="24">📁</text>
  <text x="120" y="200" class="txt-title" font-size="28">3</text>
  <text x="120" y="225" class="txt-body" font-size="12">Projects đang theo dõi</text>
  <text x="240" y="195" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="end">▲ +1 tuần này</text>

  <!-- Stat Card 2 -->
  <rect x="330" y="165" width="250" height="90" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <text x="355" y="200" font-size="24">🔑</text>
  <text x="400" y="200" class="txt-title" font-size="28">24</text>
  <text x="400" y="225" class="txt-body" font-size="12">Keywords đang watch</text>
  <text x="520" y="195" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="end">▲ +5 tuần này</text>

  <!-- Stat Card 3 -->
  <rect x="610" y="165" width="250" height="90" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <text x="635" y="200" font-size="24">📄</text>
  <text x="680" y="200" class="txt-title" font-size="28">1.2K</text>
  <text x="680" y="225" class="txt-body" font-size="12">Bài báo trong projects</text>
  <text x="800" y="195" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="end">▲ +62 tháng này</text>

  <!-- Stat Card 4 -->
  <rect x="890" y="165" width="260" height="90" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <text x="915" y="200" font-size="24">📰</text>
  <text x="960" y="200" class="txt-title" font-size="28">18</text>
  <text x="960" y="225" class="txt-body" font-size="12">Journals theo dõi</text>
  <text x="1080" y="195" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">— Không đổi</text>

