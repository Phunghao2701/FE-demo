  <rect x="50" y="600" width="520" height="150" rx="12" fill="#111827" stroke="#1e293b" />
  <text x="80" y="635" class="txt-title" font-size="16">🔥 Trending Keywords</text>
  <text x="540" y="635" class="txt-body" font-size="12" fill="#00d4ff" text-anchor="end">Xem thêm →</text>
  
  <rect x="80" y="655" width="160" height="28" rx="14" fill="#1e293b" stroke="#334155" />
  <text x="160" y="673" font-family="sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">Large Language Model <tspan fill="#10b981">+2.4k</tspan></text>
  
  <rect x="250" y="655" width="90" height="28" rx="14" fill="#1e293b" stroke="#334155" />
  <text x="295" y="673" font-family="sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">RAG <tspan fill="#10b981">+1.8k</tspan></text>

  <rect x="350" y="655" width="100" height="28" rx="14" fill="#1e293b" stroke="#334155" />
  <text x="400" y="673" font-family="sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">Diffusion <tspan fill="#10b981">+1.2k</tspan></text>

  <rect x="80" y="695" width="110" height="28" rx="14" fill="#1e293b" stroke="#334155" />
  <text x="135" y="713" font-family="sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">Multimodal <tspan fill="#10b981">+980</tspan></text>

  <rect x="200" y="695" width="150" height="28" rx="14" fill="#1e293b" stroke="#00d4ff" />
  <text x="275" y="713" font-family="sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle">Fine-tuning ★</text>

  <!-- Quick Access Links -->
  <rect x="600" y="600" width="550" height="150" rx="12" fill="#111827" stroke="#1e293b" />
