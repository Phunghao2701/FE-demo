  <rect x="630" y="660" width="110" height="64" rx="8" fill="#1e293b" stroke="#334155" />
  <text x="685" y="685" font-size="20" text-anchor="middle">🔍</text>
  <text x="685" y="708" class="txt-title" font-size="11" text-anchor="middle">Tìm kiếm</text>

  <rect x="760" y="660" width="110" height="64" rx="8" fill="#1e293b" stroke="#334155" />
  <text x="815" y="685" font-size="20" text-anchor="middle">📰</text>
  <text x="815" y="708" class="txt-title" font-size="11" text-anchor="middle">Journals</text>

  <rect x="890" y="660" width="110" height="64" rx="8" fill="#1e293b" stroke="#334155" />
  <text x="945" y="685" font-size="20" text-anchor="middle">🌏</text>
  <text x="945" y="708" class="txt-title" font-size="11" text-anchor="middle">Bản đồ địa lý</text>

  <rect x="1020" y="660" width="110" height="64" rx="8" fill="#1e293b" stroke="#334155" />
  <text x="1075" y="685" font-size="20" text-anchor="middle">🏆</text>
  <text x="1075" y="708" class="txt-title" font-size="11" text-anchor="middle">Leaderboard</text>
