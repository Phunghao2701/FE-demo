  <text x="915" y="435" class="txt-body" font-size="12">5 journals · 321 bài báo</text>
  <rect x="1080" y="410" width="45" height="20" rx="4" fill="#1e3a8a" />
  <text x="1102" y="424" font-family="sans-serif" font-size="10" fill="#60a5fa" font-weight="bold" text-anchor="middle">New</text>

