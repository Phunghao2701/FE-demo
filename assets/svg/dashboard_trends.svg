  <text x="640" y="560" class="txt-body" font-size="11" text-anchor="middle">2024</text>
  
  <!-- Colored Chart Paths -->
  <!-- Dataset 1 AI (Teal) -->
  <path d="M 140,510 L 240,470 L 340,420 L 440,360 L 540,310 L 640,290" fill="none" stroke="#00d4ff" stroke-width="3" />
  <circle cx="640" cy="290" r="5" fill="#00d4ff" />
  
  <!-- Dataset 2 Bioinformatics (Purple) -->
  <path d="M 140,530 L 240,510 L 340,490 L 440,450 L 540,390 L 640,360" fill="none" stroke="#8b5cf6" stroke-width="3" />
  <circle cx="640" cy="360" r="5" fill="#8b5cf6" />
  
  <!-- Dataset 3 Climate (Amber) -->
  <path d="M 140,490 L 240,460 L 340,440 L 440,410 L 540,370 L 640,340" fill="none" stroke="#f59e0b" stroke-width="3" />
  <circle cx="640" cy="340" r="5" fill="#f59e0b" />

  <!-- Sidebar: Recent Projects -->
  <rect x="830" y="280" width="320" height="300" rx="12" fill="#111827" stroke="#1e293b" />
  <text x="860" y="315" class="txt-title" font-size="16">Projects gần đây</text>
  <text x="1110" y="315" class="txt-body" font-size="12" fill="#00d4ff" text-anchor="end">Xem tất cả →</text>
  
  <!-- Project Item 1 -->
  <rect x="860" y="340" width="40" height="40" rx="8" fill="url(#accent-grad)" />
  <text x="880" y="366" font-size="20" text-anchor="middle">🤖</text>
  <text x="915" y="358" class="txt-title" font-size="14">AI &amp; Machine Learning</text>
  <text x="915" y="375" class="txt-body" font-size="12">8 journals · 542 bài báo</text>
  <rect x="1080" y="350" width="45" height="20" rx="4" fill="#065f46" />
  <text x="1102" y="364" font-family="sans-serif" font-size="10" fill="#34d399" font-weight="bold" text-anchor="middle">Active</text>
  
  <!-- Project Item 2 -->
  <rect x="860" y="400" width="40" height="40" rx="8" fill="#6366f1" />
