  <text x="830" y="268" class="txt-body" font-size="11" fill="#64748b">AI &amp; ML</text>
  <text x="790" y="295" class="txt-title" font-size="15">Nature Machine Intelligence</text>
  <text x="790" y="320" class="txt-body" font-size="12">IF: <tspan fill="#f8fafc">25.8</tspan>  ·  H-Index: <tspan fill="#f8fafc">112</tspan>  ·  Publisher: Nature</text>
  <rect x="1050" y="335" width="85" height="28" rx="6" fill="#1e293b" stroke="#00d4ff" />
  <text x="1092" y="353" class="btn-text" fill="#00d4ff">+ Theo dõi</text>

  <!-- Card 3 -->
  <rect x="360" y="395" width="380" height="140" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <rect x="380" y="415" width="30" height="18" rx="3" fill="#065f46" />
  <text x="395" y="428" font-family="sans-serif" font-size="9" fill="#34d399" font-weight="bold" text-anchor="middle">Q1</text>
  <text x="420" y="428" class="txt-body" font-size="11" fill="#64748b">Bioinformatics</text>
  <text x="380" y="455" class="txt-title" font-size="15">Bioinformatics</text>
  <text x="380" y="480" class="txt-body" font-size="12">IF: <tspan fill="#f8fafc">5.8</tspan>  ·  H-Index: <tspan fill="#f8fafc">248</tspan>  ·  Publisher: Oxford</text>
  <rect x="640" y="495" width="85" height="28" rx="6" fill="#1e293b" stroke="#00d4ff" />
  <text x="682" y="513" class="btn-text" fill="#00d4ff">+ Theo dõi</text>

  <!-- Card 4 -->
  <rect x="770" y="395" width="380" height="140" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <rect x="790" y="415" width="30" height="18" rx="3" fill="#065f46" />
  <text x="805" y="428" font-family="sans-serif" font-size="9" fill="#34d399" font-weight="bold" text-anchor="middle">Q1</text>
  <text x="830" y="428" class="txt-body" font-size="11" fill="#64748b">Computer Science</text>
  <text x="790" y="455" class="txt-title" font-size="15">Journal of Machine Learning Res.</text>
  <text x="790" y="480" class="txt-body" font-size="12">IF: <tspan fill="#f8fafc">6.0</tspan>  ·  H-Index: <tspan fill="#f8fafc">180</tspan>  ·  Publisher: JMLR</text>
  <rect x="1050" y="495" width="85" height="28" rx="6" fill="#00d4ff" />
  <text x="1092" y="513" class="btn-text">✓ Đang theo dõi</text>

  <!-- Card 5 -->
  <rect x="360" y="555" width="380" height="140" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <rect x="380" y="575" width="30" height="18" rx="3" fill="#78350f" />
  <text x="395" y="588" font-family="sans-serif" font-size="9" fill="#fbbf24" font-weight="bold" text-anchor="middle">Q2</text>
  <text x="420" y="588" class="txt-body" font-size="11" fill="#64748b">Cheminformatics</text>
  <text x="380" y="615" class="txt-title" font-size="15">Journal of Cheminformatics</text>
  <text x="380" y="640" class="txt-body" font-size="12">IF: <tspan fill="#f8fafc">4.2</tspan>  ·  H-Index: <tspan fill="#f8fafc">80</tspan>  ·  Publisher: BMC</text>
  <rect x="640" y="655" width="85" height="28" rx="6" fill="#1e293b" stroke="#00d4ff" />
  <text x="682" y="673" class="btn-text" fill="#00d4ff">+ Theo dõi</text>

  <!-- Card 6 -->
  <rect x="770" y="555" width="380" height="140" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <rect x="790" y="575" width="30" height="18" rx="3" fill="#065f46" />
  <text x="805" y="588" font-family="sans-serif" font-size="9" fill="#34d399" font-weight="bold" text-anchor="middle">Q1</text>
  <text x="830" y="588" class="txt-body" font-size="11" fill="#64748b">Neuroscience</text>
  <text x="790" y="615" class="txt-title" font-size="15">Frontiers in Human Neuroscience</text>
  <text x="790" y="640" class="txt-body" font-size="12">IF: <tspan fill="#f8fafc">3.6</tspan>  ·  H-Index: <tspan fill="#f8fafc">115</tspan>  ·  Publisher: Frontiers</text>
  <rect x="1050" y="655" width="85" height="28" rx="6" fill="#1e293b" stroke="#00d4ff" />
  <text x="1092" y="673" class="btn-text" fill="#00d4ff">+ Theo dõi</text>

  <!-- Pagination -->
  <rect x="660" y="715" width="32" height="32" rx="6" fill="#1e293b" stroke="#334155" />
  <text x="676" y="735" class="txt-title" font-size="13" text-anchor="middle">◀</text>

  <rect x="700" y="715" width="32" height="32" rx="6" fill="url(#accent-grad)" />
