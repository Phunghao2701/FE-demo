<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  
  <style>
    .txt-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #f8fafc; }
    .txt-body { font-family: system-ui, -apple-system, sans-serif; font-weight: 400; fill: #94a3b8; }
    .txt-accent { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #00d4ff; }
    .btn-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12px; fill: #ffffff; text-anchor: middle; }
    .nav-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 14px; fill: #94a3b8; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)" />

  <!-- APP NAVBAR -->
  <rect width="1200" height="64" fill="#0b0f19" />
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#1e293b" stroke-width="1" />
  <text x="50" y="38" class="txt-title" font-size="20" letter-spacing="-0.5">🔬 <tspan fill="#00d4ff">Research</tspan>Pulse</text>
  
  <text x="250" y="37" class="nav-text">🏠 Dashboard</text>
  <text x="370" y="37" class="nav-text active" fill="#f8fafc" font-weight="600">🔍 Tìm kiếm</text>
  <line x1="365" y1="63" x2="450" y2="63" stroke="#00d4ff" stroke-width="2" />
  <text x="480" y="37" class="nav-text">🌏 Bản đồ địa lý</text>
  <text x="610" y="37" class="nav-text">🏆 Tác giả</text>
  <text x="700" y="37" class="nav-text">📁 Projects</text>
  
  <rect x="940" y="16" width="60" height="32" rx="6" fill="#1e293b" />
  <text x="970" y="36" font-family="sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">🌐 VI</text>
  <circle cx="1040" cy="32" r="16" fill="url(#accent-grad)" />
  <text x="1040" y="36" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">JD</text>
  <text x="1065" y="37" class="txt-title" font-size="13">John Doe ▾</text>

  <!-- CONTENT -->
  <text x="50" y="115" class="txt-title" font-size="22">Tra cứu &amp; Tìm kiếm danh mục</text>
  <text x="50" y="138" class="txt-body" font-size="14">Duyệt qua các tạp chí khoa học uy tín, phân loại theo Scimago, Scopus, WoS.</text>

  <!-- Main layout grid: Left filter (300px), Right results (800px) -->
  
  <!-- LEFT SIDEBAR: FILTERS -->
  <rect x="50" y="170" width="280" height="570" rx="10" fill="#111827" stroke="#1e293b" />
  <text x="80" y="205" class="txt-title" font-size="15">Bộ lọc nâng cao</text>
  
  <!-- Filter 1: Subject Area -->
  <text x="80" y="240" class="txt-title" font-size="13" fill="#cbd5e1">Lĩnh vực (Subject Area)</text>
  <rect x="80" y="250" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" />
  <text x="95" y="271" class="txt-body" font-size="12">Tất cả lĩnh vực ▾</text>

  <!-- Filter 2: Ranking tier -->
  <text x="80" y="315" class="txt-title" font-size="13" fill="#cbd5e1">Bậc xếp hạng</text>
  
  <rect x="80" y="330" width="45" height="24" rx="4" fill="#065f46" />
  <text x="102" y="346" font-family="sans-serif" font-size="11" fill="#34d399" font-weight="bold" text-anchor="middle">Q1</text>

  <rect x="135" y="330" width="45" height="24" rx="4" fill="#78350f" />
  <text x="157" y="346" font-family="sans-serif" font-size="11" fill="#fbbf24" font-weight="bold" text-anchor="middle">Q2</text>

  <rect x="190" y="330" width="45" height="24" rx="4" fill="#1e293b" stroke="#334155" />
  <text x="212" y="346" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Q3</text>

  <rect x="245" y="330" width="45" height="24" rx="4" fill="#1e293b" stroke="#334155" />
  <text x="267" y="346" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Q4</text>

  <!-- Filter 3: H-index slider mockup -->
  <text x="80" y="395" class="txt-title" font-size="13" fill="#cbd5e1">H-Index tối thiểu</text>
  <line x1="80" y1="415" x2="280" y2="415" stroke="#334155" stroke-width="4" stroke-linecap="round" />
  <line x1="80" y1="415" x2="180" y2="415" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" />
  <circle cx="180" cy="415" r="8" fill="#00d4ff" stroke="#ffffff" stroke-width="2" />
  <text x="180" y="440" class="txt-title" font-size="12" fill="#00d4ff" text-anchor="middle">50+</text>

  <!-- Filter 4: Publisher Checkboxes -->
  <text x="80" y="485" class="txt-title" font-size="13" fill="#cbd5e1">Nhà xuất bản</text>
  
  <rect x="80" y="505" width="14" height="14" rx="3" fill="#00d4ff" />
  <path d="M 83,512 L 86,515 L 91,508" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="105" y="517" class="txt-body" font-size="12" fill="#cbd5e1">Elsevier</text>

  <rect x="80" y="535" width="14" height="14" rx="3" fill="#1e293b" stroke="#334155" />
  <text x="105" y="547" class="txt-body" font-size="12" fill="#cbd5e1">Springer Nature</text>

  <rect x="80" y="565" width="14" height="14" rx="3" fill="#1e293b" stroke="#334155" />
  <text x="105" y="577" class="txt-body" font-size="12" fill="#cbd5e1">IEEE</text>

