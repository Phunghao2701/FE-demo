  <rect x="80" y="680" width="220" height="36" rx="6" fill="#1e293b" stroke="#334155" />
  <text x="190" y="702" class="btn-text" fill="#cbd5e1">Áp dụng bộ lọc</text>

  <!-- RIGHT RESULTS AREA -->
  <!-- Search Input & Sort -->
