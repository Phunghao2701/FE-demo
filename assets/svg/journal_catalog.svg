  <text x="380" y="195" class="txt-body" font-size="13">Tìm kiếm tạp chí (ví dụ: 'computer vision', 'nature')...</text>
  
  <rect x="960" y="170" width="190" height="40" rx="6" fill="#111827" stroke="#1e293b" />
  <text x="980" y="195" class="txt-body" font-size="13">Sắp xếp: H-Index ▾</text>

  <!-- Grid of Journal Cards (2 columns, 3 rows) -->
  <!-- Card 1 -->
  <rect x="360" y="235" width="380" height="140" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <rect x="380" y="255" width="30" height="18" rx="3" fill="#065f46" />
  <text x="395" y="268" font-family="sans-serif" font-size="9" fill="#34d399" font-weight="bold" text-anchor="middle">Q1</text>
  <text x="420" y="268" class="txt-body" font-size="11" fill="#64748b">Computer Vision</text>
  <text x="380" y="295" class="txt-title" font-size="15">IEEE Trans. on Pattern Analysis...</text>
  <text x="380" y="320" class="txt-body" font-size="12">IF: <tspan fill="#f8fafc">24.8</tspan>  ·  H-Index: <tspan fill="#f8fafc">320</tspan>  ·  Publisher: IEEE</text>
  <rect x="640" y="335" width="85" height="28" rx="6" fill="#1e293b" stroke="#00d4ff" />
  <text x="682" y="353" class="btn-text" fill="#00d4ff">+ Theo dõi</text>

  <!-- Card 2 -->
  <rect x="770" y="235" width="380" height="140" rx="10" fill="url(#card-grad)" stroke="#1e293b" />
  <rect x="790" y="255" width="30" height="18" rx="3" fill="#065f46" />
