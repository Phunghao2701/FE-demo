<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="bronze-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
  </defs>
  
  <style>
    .txt-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #f8fafc; }
    .txt-body { font-family: system-ui, -apple-system, sans-serif; font-weight: 400; fill: #94a3b8; }
    .btn-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12px; fill: #ffffff; text-anchor: middle; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)" />

  <!-- APP NAVBAR -->
  <rect width="1200" height="64" fill="#0b0f19" />
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#1e293b" stroke-width="1" />
  <text x="50" y="38" class="txt-title" font-size="20" letter-spacing="-0.5">🔬 <tspan fill="#00d4ff">Research</tspan>Pulse</text>
  <text x="250" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">🏠 Dashboard</text>
  <text x="370" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">🔍 Tìm kiếm</text>
  <text x="480" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">🌏 Bản đồ địa lý</text>
  <text x="610" y="37" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">🏆 Tác giả</text>
  <line x1="605" y1="63" x2="680" y2="63" stroke="#00d4ff" stroke-width="2" />
  <text x="700" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">📁 Projects</text>
  
  <rect x="940" y="16" width="60" height="32" rx="6" fill="#1e293b" />
  <text x="970" y="36" font-family="sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">🌐 VI</text>
  <circle cx="1040" cy="32" r="16" fill="url(#accent-grad)" />
  <text x="1040" y="36" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">JD</text>
  <text x="1065" y="37" class="txt-title" font-size="13">John Doe ▾</text>

  <!-- CONTENT -->
  <text x="50" y="115" class="txt-title" font-size="22">Bảng xếp hạng Tác giả </text>
  <text x="50" y="138" class="txt-body" font-size="14">Danh sách những tác giả có đóng góp xuất sắc nhất dựa trên citations và chỉ số H-Index.</text>

  <!-- PODIUM SECTION (Top 3) -->
  <!-- 2nd Place (Silver) - Left -->
  <rect x="250" y="270" width="160" height="150" rx="10" fill="url(#silver-grad)" />
  <circle cx="330" cy="200" r="36" fill="#1e293b" stroke="#cbd5e1" stroke-width="3" />
  <text x="330" y="206" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">GH</text>
  <text x="330" y="255" class="txt-title" font-size="15" text-anchor="middle">Geoffrey Hinton</text>
  <text x="330" y="310" class="txt-title" font-size="36" fill="#1e293b" text-anchor="middle">2</text>
  <text x="330" y="350" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">980K Citations</text>
  <text x="330" y="370" font-family="sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">H-Index: 148</text>

  <!-- 1st Place (Gold) - Center -->
  <rect x="520" y="230" width="160" height="190" rx="10" fill="url(#gold-grad)" />
  <!-- Crown -->
  <path d="M 580,115 L 590,130 L 610,130 L 620,115 L 600,145 L 560,145 Z" fill="#fbbf24" />
  <circle cx="600" cy="160" r="40" fill="#1e293b" stroke="#fbbf24" stroke-width="4" />
  <text x="600" y="167" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">YL</text>
  <text x="600" y="218" class="txt-title" font-size="15" text-anchor="middle">Yann LeCun</text>
  <text x="600" y="280" class="txt-title" font-size="44" fill="#78350f" text-anchor="middle">1</text>
  <text x="600" y="330" font-family="sans-serif" font-size="12" font-weight="bold" fill="#78350f" text-anchor="middle">1.2M Citations</text>
  <text x="600" y="350" font-family="sans-serif" font-size="12" fill="#78350f" text-anchor="middle">H-Index: 184</text>

  <!-- 3rd Place (Bronze) - Right -->
  <rect x="790" y="300" width="160" height="120" rx="10" fill="url(#bronze-grad)" />
  <circle cx="870" cy="230" r="32" fill="#1e293b" stroke="#fb7185" stroke-width="3" />
  <text x="870" y="235" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">AN</text>
  <text x="870" y="282" class="txt-title" font-size="15" text-anchor="middle">Andrew Ng</text>
  <text x="870" y="335" class="txt-title" font-size="30" fill="#7f1d1d" text-anchor="middle">3</text>
  <text x="870" y="365" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7f1d1d" text-anchor="middle">876K Citations</text>
  <text x="870" y="382" font-family="sans-serif" font-size="11" fill="#7f1d1d" text-anchor="middle">H-Index: 120</text>

  <!-- LEADERBOARD TABLE -->
  <rect x="50" y="450" width="1100" height="310" rx="12" fill="#111827" stroke="#1e293b" />
  
  <!-- Table Header -->
  <rect x="50" y="450" width="1100" height="40" rx="12" fill="#1e293b" />
  <text x="80" y="475" class="txt-title" font-size="13">Xếp hạng</text>
  <text x="200" y="475" class="txt-title" font-size="13">Tác giả</text>
  <text x="500" y="475" class="txt-title" font-size="13">Chuyên ngành chính</text>
  <text x="750" y="475" class="txt-title" font-size="13">Số bài báo</text>
  <text x="950" y="475" class="txt-title" font-size="13">Tổng Citations</text>

  <!-- Row 4 -->
  <text x="80" y="525" class="txt-title" font-size="14">#4</text>
  <text x="200" y="525" class="txt-title" font-size="14">Demis Hassabis</text>
  <text x="500" y="525" class="txt-body" font-size="13">Bioinformatics, Deep Learning</text>
  <text x="750" y="525" class="txt-title" font-size="13">452</text>
  <text x="950" y="525" class="txt-title" font-size="13">750K</text>
  <line x1="80" y1="545" x2="1120" y2="545" stroke="#1e293b" stroke-width="1" />

  <!-- Row 5 -->
  <text x="80" y="580" class="txt-title" font-size="14">#5</text>
  <text x="200" y="580" class="txt-title" font-size="14">Fei-Fei Li</text>
  <text x="500" y="580" class="txt-body" font-size="13">Computer Vision, AI</text>
  <text x="750" y="580" class="txt-title" font-size="13">389</text>
  <text x="950" y="580" class="txt-title" font-size="13">620K</text>
  <line x1="80" y1="600" x2="1120" y2="600" stroke="#1e293b" stroke-width="1" />

  <!-- Row 6 -->
  <text x="80" y="635" class="txt-title" font-size="14">#6</text>
  <text x="200" y="635" class="txt-title" font-size="14">Yoshua Bengio</text>
  <text x="500" y="635" class="txt-body" font-size="13">Neural Networks, Deep Learning</text>
  <text x="750" y="635" class="txt-title" font-size="13">512</text>
  <text x="950" y="635" class="txt-title" font-size="13">590K</text>
</svg>