<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  
  <style>
    .txt-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #f8fafc; }
    .txt-body { font-family: system-ui, -apple-system, sans-serif; font-weight: 400; fill: #94a3b8; }
    .btn-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12px; fill: #ffffff; text-anchor: middle; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)" />

  <!-- APP NAVBAR -->
  <rect width="1200" height="64" fill="#0b0f19" />
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#1e293b" stroke-width="1" />
  <text x="50" y="38" class="txt-title" font-size="20" letter-spacing="-0.5">🔬 <tspan fill="#00d4ff">Research</tspan>Pulse</text>
  <text x="250" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">🏠 Dashboard</text>
  <text x="370" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">🔍 Tìm kiếm</text>
  <text x="480" y="37" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">🌏 Bản đồ địa lý</text>
  <line x1="475" y1="63" x2="575" y2="63" stroke="#00d4ff" stroke-width="2" />
  <text x="610" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">🏆 Tác giả</text>
  <text x="700" y="37" font-family="sans-serif" font-size="14" fill="#94a3b8">📁 Projects</text>
  
  <rect x="940" y="16" width="60" height="32" rx="6" fill="#1e293b" />
  <text x="970" y="36" font-family="sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">🌐 VI</text>
  <circle cx="1040" cy="32" r="16" fill="url(#accent-grad)" />
  <text x="1040" y="36" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">JD</text>
  <text x="1065" y="37" class="txt-title" font-size="13">John Doe ▾</text>

  <!-- CONTENT -->
  <text x="50" y="115" class="txt-title" font-size="22">Phân bố Địa lý của Nghiên cứu </text>
  <text x="50" y="138" class="txt-body" font-size="14">Phân tích mật độ công bố khoa học và mức độ hợp tác quốc tế giữa các quốc gia và khu vực.</text>

  <!-- MAP INTERFACE & SIDEBAR GRID -->
  <!-- Map container -->
  <rect x="50" y="170" width="750" height="420" rx="12" fill="#111827" stroke="#1e293b" />
  <text x="80" y="205" class="txt-title" font-size="15">Bản đồ hợp tác toàn cầu</text>

  <!-- Continent Outlines Mockup (Circles/polygons representing hubs) -->
  <g stroke="#334155" stroke-dasharray="2" fill="none">
    <!-- Connections -->
    <path d="M 220,330 Q 300,200 480,260" stroke="#00d4ff" stroke-width="2" />
    <path d="M 480,260 Q 600,220 800,280" stroke="#8b5cf6" stroke-width="2" />
    <path d="M 220,330 Q 500,450 800,280" stroke="#f59e0b" stroke-width="1" />
  </g>

  <!-- Hubs (Glowing Circles) -->
  <!-- North America -->
  <circle cx="220" cy="330" r="30" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff" stroke-width="2" />
  <circle cx="220" cy="330" r="6" fill="#00d4ff" />
  <text x="220" y="380" class="txt-title" font-size="12" text-anchor="middle">Bắc Mỹ (42.1K)</text>

  <!-- Europe -->
  <circle cx="480" cy="260" r="25" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2" />
  <circle cx="480" cy="260" r="5" fill="#8b5cf6" />
  <text x="480" y="305" class="txt-title" font-size="12" text-anchor="middle">Châu Âu (35.6K)</text>

  <!-- Asia -->
  <circle cx="800" cy="280" r="35" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff" stroke-width="2" />
  <circle cx="800" cy="280" r="7" fill="#00d4ff" />
  <text x="800" y="335" class="txt-title" font-size="12" text-anchor="middle">Châu Á (51.2K)</text>

  <!-- Australia -->
  <circle cx="890" cy="480" r="15" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="2" />
  <circle cx="890" cy="480" r="4" fill="#f59e0b" />

  <!-- Sidebar: Top Countries -->
  <rect x="830" y="170" width="320" height="420" rx="12" fill="#111827" stroke="#1e293b" />
  <text x="860" y="205" class="txt-title" font-size="15">Top quốc gia xuất bản</text>
  
  <!-- Bar 1: USA -->
  <text x="860" y="245" class="txt-title" font-size="13">1. Hoa Kỳ (USA)</text>
  <rect x="860" y="255" width="220" height="12" rx="4" fill="#00d4ff" />
  <text x="1120" y="266" class="txt-title" font-size="12" text-anchor="end">42.1K</text>

  <!-- Bar 2: China -->
  <text x="860" y="305" class="txt-title" font-size="13">2. Trung Quốc (China)</text>
  <rect x="860" y="315" width="250" height="12" rx="4" fill="#00d4ff" />
  <text x="1120" y="326" class="txt-title" font-size="12" text-anchor="end">48.9K</text>

  <!-- Bar 3: UK -->
  <text x="860" y="365" class="txt-title" font-size="13">3. Vương quốc Anh (UK)</text>
  <rect x="860" y="375" width="110" height="12" rx="4" fill="#8b5cf6" />
  <text x="1120" y="386" class="txt-title" font-size="12" text-anchor="end">18.5K</text>

  <!-- Bar 4: Germany -->
  <text x="860" y="425" class="txt-title" font-size="13">4. Đức (Germany)</text>
  <rect x="860" y="435" width="90" height="12" rx="4" fill="#8b5cf6" />
  <text x="1120" y="446" class="txt-title" font-size="12" text-anchor="end">15.2K</text>

  <!-- Bar 5: Vietnam -->
  <text x="860" y="485" class="txt-title" font-size="13">5. Việt Nam (Vietnam)</text>
  <rect x="860" y="495" width="45" height="12" rx="4" fill="#f59e0b" />
  <text x="1120" y="506" class="txt-title" font-size="12" text-anchor="end">6.2K</text>

  <!-- Bottom Panel: Collaboration Network stats -->
  <rect x="50" y="610" width="1100" height="140" rx="12" fill="#111827" stroke="#1e293b" />
  <text x="80" y="645" class="txt-title" font-size="15">Chỉ số hợp tác quốc tế (Collaboration Network)</text>
  
  <text x="80" y="685" class="txt-body" font-size="13">
    <tspan fill="#f8fafc">64%</tspan> các nghiên cứu AI tại Việt Nam có đồng tác giả quốc tế.
    Các đối tác nghiên cứu hàng đầu: <tspan fill="#00d4ff">Hoa Kỳ (42%)</tspan>, <tspan fill="#00d4ff">Úc (18%)</tspan>, <tspan fill="#00d4ff">Hàn Quốc (12%)</tspan>.
  </text>
</svg>